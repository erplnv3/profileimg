<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Capture Photo</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    text-align: center;
}
img{
    
}
img {
    width: 250px;
    height: 250px;
    object-fit: cover;
    border-radius: 12px;
    margin: 20px 0;
    border: 1px solid #ddd;
}

button {
    width: 250px;
    padding: 15px;
    margin: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Take Profile Photo</h2>

<input
    type="file"
    id="camera"
    accept="image/*"
    capture="user"
    style="display:none"
/>

<button onclick="document.getElementById('camera').click()">
    Open Camera
</button>

<br>

<img id="preview" style="display:none">

<br>

<button
    id="sendBtn"
    onclick="sendToApp()"
    style="display:none">
    Send To App
</button>

<script>
let imageData = "";

document
.getElementById("camera")
.addEventListener("change", function(e) {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(evt) {

        imageData = evt.target.result;

        document.getElementById("preview").src = imageData;
        document.getElementById("preview").style.display = "block";
        document.getElementById("sendBtn").style.display = "inline-block";

        console.log(
            "Base64 length:",
            imageData.length
        );
    };

    reader.readAsDataURL(file);
});

function sendToApp() {

    // Ask for permission before sending
    if (!confirm("Do you want to send this photo to the Pulse app?")) {
        return;
    }

    const small = encodeURIComponent(imageData.substring(0, 5000));
    const appScheme = `Pulse://profile?image=${small}`;

    // Try to open the app using the custom URI scheme
    window.location.href = appScheme;

    // Fallback check: if the app is not installed, the user will still be on this page after a delay
    setTimeout(function() {
        alert("The Pulse app does not appear to be installed on this device. Please install it to use this feature.");
        // Optional: redirect to app store here
        // window.location.href = "market://details?id=com.your.package";
    }, 2500);
}
</script>

</body>
</html>
