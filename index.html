<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Capture Photo</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

* {
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
    color: #333;
}

h2 {
    font-weight: 600;
    color: #1a202c;
    margin-bottom: 24px;
    font-size: 26px;
    text-align: center;
}

img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 50%;
    margin: 20px auto;
    border: 4px solid #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

button {
    width: 100%;
    max-width: 280px;
    padding: 16px;
    margin: 10px auto;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:active {
    transform: translateY(2px);
    box-shadow: 0 2px 8px rgba(118, 75, 162, 0.3);
}

button:hover {
    box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
    transform: translateY(-2px);
}
</style>
</head>

<body>

<h2>Take Profile Photo</h2>

<input
    type="file"
    id="camera"
    accept="image/*"
    capture="user"
    style="display:none"
/>

<button onclick="document.getElementById('camera').click()">
    Open Camera
</button>

<br>

<img id="preview" style="display:none">

<br>

<button
    id="sendBtn"
    onclick="sendToApp()"
    style="display:none">
    Send To App
</button>

<script>
let imageData = "";

document
.getElementById("camera")
.addEventListener("change", function(e) {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(evt) {

        imageData = evt.target.result;

        document.getElementById("preview").src = imageData;
        document.getElementById("preview").style.display = "block";
        document.getElementById("sendBtn").style.display = "inline-block";

        console.log(
            "Base64 length:",
            imageData.length
        );
    };

    reader.readAsDataURL(file);
});

function sendToApp() {

    // Ask for permission before sending
    if (!confirm("Do you want to send this photo to the Pulse app?")) {
        return;
    }

    const small = encodeURIComponent(imageData.substring(0, 5000));
    const appScheme = `Pulse://profile?image=${small}`;

    // Try to open the app using the custom URI scheme
    window.location.href = appScheme;

    // Fallback check: if the app is not installed, the user will still be on this page after a delay
    setTimeout(function() {
        alert("The Pulse app does not appear to be installed on this device. Please install it to use this feature.");
        // Optional: redirect to app store here
        window.location.href = "market://details?id=com.myapp";
    }, 2500);
}



// {

// }

</script>

</body>
</html>
