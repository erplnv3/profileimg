<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Capture Photo</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    text-align: center;
}
img{
    
}
img {
    width: 250px;
    height: 250px;
    object-fit: cover;
    border-radius: 12px;
    margin: 20px 0;
    border: 1px solid #ddd;
}

button {
    width: 250px;
    padding: 15px;
    margin: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Take Profile Photo</h2>

<input
    type="file"
    id="camera"
    accept="image/*"
    capture="user"
    style="display:none"
/>

<button onclick="document.getElementById('camera').click()">
    Open Camera
</button>

<br>

<img id="preview" style="display:none">

<br>

<button
    id="sendBtn"
    onclick="sendToApp()"
    style="display:none">
    Send To App
</button>

<script>
let imageData = "";

document
.getElementById("camera")
.addEventListener("change", function(e) {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(evt) {

        imageData = evt.target.result;

        document.getElementById("preview").src = imageData;
        document.getElementById("preview").style.display = "block";
        document.getElementById("sendBtn").style.display = "inline-block";

        console.log(
            "Base64 length:",
            imageData.length
        );
    };

    reader.readAsDataURL(file);
});

function sendToApp() {

    // reduce size to test
    const small =
        encodeURIComponent(
            imageData.substring(0, 5000)
        );

    window.location.href =
        `pulse://profile?image=${small}`;
}
</script>

</body>
</html>
